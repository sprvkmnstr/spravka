<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR для справки 095/у (Version 3)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', Arial, sans-serif; background: #f5f6f7; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 16px; font-size: 20px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 12px; margin-bottom: 4px; color: #666; }
        .field input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; width: 200px; }
        button { padding: 8px 20px; background: #06f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0050cc; }
        .qr-button { background: #0a5; }
        .qr-button:hover { background: #085; }
        .qr-container { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; text-align: center; border: 1px solid #ddd; display: none; }
        .qr-image { margin: 10px auto; display: inline-block; }
        .qr-link { font-size: 12px; color: #666; word-break: break-all; margin-top: 12px; }
        hr { margin: 20px 0; }
        .info { background: #e8f0fe; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🏥 Генератор QR-кода для справки 095/у</h2>
        <p style="margin-bottom: 16px; color: #666;">Точная копия оригинального QR ЕМИАС — Version 3 (29×29)</p>
        
        <div class="form-row">
            <div class="field">
                <label>ФИО пациента</label>
                <input type="text" id="patientName" placeholder="Иванов Иван Иванович">
            </div>
            <div class="field">
                <label>Дата оформления</label>
                <input type="date" id="issueDate">
            </div>
            <div class="field">
                <label>ФИО врача</label>
                <input type="text" id="doctorName" placeholder="Петрова Анна Сергеевна">
            </div>
            <button id="generateBtn" class="qr-button">🎯 Сгенерировать QR-код</button>
        </div>
        
        <div class="info">
            ✅ Используется версия <strong>Version 3 (29×29 модулей)</strong> — точно как на оригинальных справках ЕМИАС.<br>
            Поисковые квадраты: 7×7, расстояние между ними — 9 клеток.
        </div>
        
        <div id="qrResult" class="qr-container">
            <h3>📱 QR-код для печати на справке:</h3>
            <div id="qrImage" class="qr-image"></div>
            <p class="qr-link" id="qrLink"></p>
            <button id="downloadBtn" style="margin-top: 12px; padding: 6px 12px; background: #06f; color: white; border: none; border-radius: 6px; cursor: pointer;">💾 Скачать QR-код (PNG)</button>
        </div>
    </div>
</div>

<script>
    // Version 3 (29×29) — точная копия оригинального QR ЕМИАС
    async function generateQRWithLogo(text, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return null;
        
        container.innerHTML = '<div style="text-align:center;">⏳ Генерация QR-кода...</div>';
        
        // Загружаем логотип
        let logoImg = null;
        try {
            logoImg = await new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => reject();
                img.src = 'logo.png';
                setTimeout(() => reject(), 2000);
            });
        } catch(e) {}
        
        // Version 3 = 29×29 модулей (как на оригинальной справке ЕМИАС)
        const size = 500;
        const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&ecc=L&version=3`;
        
        let qrImage = null;
        try {
            qrImage = await new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => reject();
                img.src = apiUrl;
                setTimeout(() => reject(), 5000);
            });
        } catch(e) {
            container.innerHTML = '<p style="color:red;">❌ Ошибка генерации QR. Проверьте интернет.</p>';
            return null;
        }
        
        // Создаём canvas
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        ctx.drawImage(qrImage, 0, 0, size, size);
        
        // Белый круг в центре
        const centerX = size/2;
        const centerY = size/2;
        const circleRadius = Math.floor(size / 7.5);
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, circleRadius, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#dddddd';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Логотип или сердечко
        if (logoImg) {
            const logoSize = circleRadius * 1.4;
            ctx.drawImage(logoImg, centerX - logoSize/2, centerY - logoSize/2, logoSize, logoSize);
        } else {
            ctx.font = `${circleRadius * 1.2}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.fillStyle = '#E31E24';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤️', centerX, centerY);
        }
        
        const resultImg = document.createElement('img');
        resultImg.src = canvas.toDataURL('image/png');
        resultImg.style.width = '250px';
        resultImg.style.height = '250px';
        resultImg.style.display = 'block';
        resultImg.style.margin = '0 auto';
        resultImg.style.border = '1px solid #ddd';
        resultImg.style.padding = '10px';
        resultImg.style.background = 'white';
        
        container.innerHTML = '';
        container.appendChild(resultImg);
        
        return canvas.toDataURL('image/png');
    }

    function buildPatientLink(patient, date, doctor) {
        const baseUrl = window.location.origin + '/spravka/view.html';
        const doctorCert = '1832820349536861278881725538315849685825';
        const doctorValid = 'с 11.12.2025 по 11.03.2027';
        const orgCert = '96403703493897758531285374117963780380';
        const orgValid = 'с 17.11.2025 по 10.02.2027';
        const medicalOrg = 'ГП 8 Ф 2 (ГП 124)';
        const orgFullName = 'ГОСУДАРСТВЕННОЕ БЮДЖЕТНОЕ УЧРЕЖДЕНИЕ ЗДРАВООХРАНЕНИЯ ГОРОДА МОСКВЫ "ГОРОДСКАЯ ПОЛИКЛИНИКА № 8 ДЕПАРТАМЕНТА ЗДРАВООХРАНЕНИЯ ГОРОДА МОСКВЫ"';
        const address = 'г. Москва, Мичуринский проспект, Олимпийская деревня, дом 16, корп. 1';
        const ogrn = '1037739410928';
        
        const params = new URLSearchParams({
            patient: patient,
            date: date,
            doctor: doctor,
            doctorCert: doctorCert,
            doctorValid: doctorValid,
            orgCert: orgCert,
            orgValid: orgValid,
            medicalOrg: medicalOrg,
            orgName: orgFullName,
            address: address,
            ogrn: ogrn
        });
        
        return baseUrl + '?' + params.toString();
    }
    
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const qrResult = document.getElementById('qrResult');
    const qrLinkSpan = document.getElementById('qrLink');
    let currentQrDataUrl = null;
    
    generateBtn.addEventListener('click', async () => {
        const patient = document.getElementById('patientName').value;
        const date = document.getElementById('issueDate').value;
        const doctor = document.getElementById('doctorName').value;
        
        if (!patient || !date || !doctor) {
            alert('Пожалуйста, заполните все поля');
            return;
        }
        
        const patientLink = buildPatientLink(patient, date, doctor);
        qrLinkSpan.innerText = patientLink;
        
        currentQrDataUrl = await generateQRWithLogo(patientLink, 'qrImage');
        if (currentQrDataUrl) {
            qrResult.style.display = 'block';
        } else {
            alert('Ошибка генерации QR');
        }
    });
    
    downloadBtn.addEventListener('click', () => {
        if (currentQrDataUrl) {
            const link = document.createElement('a');
            const patient = document.getElementById('patientName').value;
            const fileName = `QR_095_${patient.replace(/[^а-яА-Яa-zA-Z0-9]/g, '_')}.png`;
            link.download = fileName;
            link.href = currentQrDataUrl;
            link.click();
        } else {
            alert('Сначала сгенерируйте QR-код!');
        }
    });
</script>
</body>
</html>
